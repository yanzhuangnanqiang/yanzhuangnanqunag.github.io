<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>清风手帐 · 塞琳娜</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', '微软雅黑', system-ui, sans-serif;
            overflow-x: hidden;
            cursor: default;
            background-color: #0f2a2a; /* 深色底，防止加载闪白 */
        }

        /* 视频背景 */
        .bg-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            z-index: -3;
            filter: brightness(0.85) saturate(1.05) hue-rotate(-5deg);
            opacity: 0;
            animation: gentleAppear 2.4s ease-out forwards;
        }

        /* 柔光遮罩 */
        .overlay {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, 
                rgba(180, 220, 200, 0.1) 0%, 
                rgba(120, 180, 160, 0.05) 100%);
            backdrop-filter: blur(1px);
            z-index: -2;
            opacity: 0;
            animation: gentleAppear 2s ease-out 0.3s forwards;
        }

        /* 树叶飘落画布 */
        #leafCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
            opacity: 0;
            animation: gentleAppear 3s ease-out 0.5s forwards;
        }

        /* 鼠标跟随光斑 */
        .mouse-light {
            position: fixed;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(160, 210, 180, 0.25) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
            transition: transform 0.12s ease-out;
            mix-blend-mode: screen;
            opacity: 0;
            animation: gentleAppear 2s ease-out 1s forwards;
        }

        /* 主容器 */
        .wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        /* 玻璃态手帐卡片 —— 核心淡入 + 模糊渐清 */
        .journal-card {
            max-width: 750px;
            width: 100%;
            background: #3b927540;
            backdrop-filter: blur(12px) saturate(180%);
            -webkit-backdrop-filter: blur(12px) saturate(180%);
            border-radius: 36px;
            padding: 40px 30px;
            box-shadow: 0 20px 40px rgba(30, 60, 50, 0.15),
                        0 0 0 1px rgba(210, 240, 230, 0.3) inset;
            color: #1e3a3a;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            position: relative; /* 为了印章定位 */
            
            /* 邂逅淡入效果：初始透明且轻微模糊，然后清晰 */
            opacity: 0;
            transform: scale(0.98) translateY(10px);
            filter: blur(2px);
            animation: encounterReveal 1.8s cubic-bezier(0.23, 1, 0.32, 1) 0.2s forwards;
        }

        @keyframes encounterReveal {
            0% {
                opacity: 0;
                transform: scale(0.98) translateY(10px);
                filter: blur(4px);
            }
            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
                filter: blur(0);
            }
        }

        @keyframes gentleAppear {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        /* 内部元素依次淡入 (用 animation-delay 错开) */
        .fade-stagger {
            opacity: 0;
            animation: fadeItem 0.8s ease-out forwards;
        }

        @keyframes fadeItem {
            0% { opacity: 0; transform: translateY(6px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* 给各个模块加上动画延迟 */
        h1 { animation-delay: 0.3s; }
        .subtitle { animation-delay: 0.45s; }
        .handbook { animation-delay: 0.6s; }
        .stats-grid { animation-delay: 0.75s; }
        .link-group { animation-delay: 0.9s; }
        .footer-note { animation-delay: 1.05s; }

        /* 古风题词（悬浮于标题之上） */
        .ancient-verse {
            text-align: center;
            margin-bottom: 5px;
            opacity: 0;
            letter-spacing: 6px;
            font-size: 0.9rem;
            color: #2e5e5e;
            text-shadow: 0 0 6px rgba(255,255,240,0.6);
            animation: fadeItem 0.8s ease-out 0.15s forwards;
        }

        /* 左上角印章 */
        .chop-seal {
            position: absolute;
            top: 20px;
            left: 30px;
            font-size: 0.8rem;
            writing-mode: vertical-rl;
            text-orientation: upright;
            color: #3b6b5e;
            opacity: 0;
            letter-spacing: 2px;
            border-left: 1px solid rgba(90, 130, 110, 0.3);
            padding-left: 6px;
            animation: fadeItem 0.8s ease-out 0.5s forwards;
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 350;
            letter-spacing: 4px;
            text-align: center;
            color: #1e4a4a;
            margin-bottom: 10px;
            text-shadow: 2px 2px 10px rgba(255, 255, 255, 0.6);
        }

        .subtitle {
            text-align: center;
            font-size: 1.1rem;
            margin-bottom: 30px;
            color: #2a5e5e;
            font-style: italic;
            border-bottom: 1px dashed rgba(70, 110, 100, 0.3);
            padding-bottom: 20px;
        }

        .handbook {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 12px 15px;
            background: rgba(255, 255, 255, 0.2);
            padding: 20px 25px;
            border-radius: 28px;
            margin-bottom: 30px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        .handbook-item {
            display: contents;
        }

        .handbook-label {
            font-weight: 500;
            color: #1d4e4e;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .handbook-value {
            color: #0b3a3a;
            font-weight: 400;
        }

        .stats-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin: 25px 0;
        }

        .stats-grid img {
            border-radius: 16px;
            box-shadow: 0 6px 16px rgba(30, 60, 50, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.5);
            max-width: 100%;
            height: auto;
        }

        .link-group {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin: 15px 0 5px;
        }

        .btn {
            padding: 10px 28px;
            border-radius: 40px;
            background: rgba(235, 250, 245, 0.3);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            color: #144d4d;
            text-decoration: none;
            font-weight: 500;
            letter-spacing: 1px;
            transition: 0.3s;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.05);
        }

        .btn:hover {
            background: rgba(200, 240, 230, 0.5);
            border-color: #9ad8c5;
            color: #0a3a3a;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(30, 80, 70, 0.15);
        }

        .footer-note {
            text-align: center;
            margin-top: 30px;
            font-size: 0.9rem;
            color: #28635c;
        }

        .visitor-badge {
            margin-bottom: 10px;
        }

        .signature {
            opacity: 0.8;
        }

        @media (max-width: 600px) {
            h1 { font-size: 2rem; }
            .journal-card { padding: 30px 20px; }
            .handbook { grid-template-columns: 1fr; gap: 8px; }
            .handbook-label { margin-top: 5px; }
        }
    </style>
</head>
<body>

    <!-- 视频背景 -->
    <video class="bg-video" autoplay loop muted playsinline preload="auto">
        <source src="xiaguang.mp4" type="video/mp4">
    </video>
    <div class="overlay"></div>

    <!-- 树叶飘落画布 -->
    <canvas id="leafCanvas"></canvas>

    <!-- 鼠标跟随柔光 -->
    <div class="mouse-light"></div>

    <div class="wrapper">
        <div class="journal-card">

            <!-- 古风印章（左上） -->
            <div class="chop-seal">塞琳娜</div>

            <!-- 古风题词（标题之上） -->
            <div class="ancient-verse">✦ 山 月 不 知 心 底 事 ✦</div>

            <h1 class="fade-stagger">☾ 清风手帐 ☽</h1>
            <div class="subtitle fade-stagger">「始于书信，敬于才华，合于性格，久于品德。」</div>

            <div class="handbook fade-stagger">
                <div class="handbook-item">
                    <span class="handbook-label">🌱 正在学习</span>
                    <span class="handbook-value">C 语言 · Rust 语言</span>
                </div>
                <div class="handbook-item">
                    <span class="handbook-label">📚 兴趣领域</span>
                    <span class="handbook-value">编程 · 阅读 · 独立开发</span>
                </div>
                <div class="handbook-item">
                    <span class="handbook-label">🤝 寻找伙伴</span>
                    <span class="handbook-value">同样坚持终身学习的人</span>
                </div>
                <div class="handbook-item">
                    <span class="handbook-label">📬 联系方式</span>
                    <span class="handbook-value">私信</span>
                </div>
                <div class="handbook-item">
                    <span class="handbook-label">✨ 一个事实</span>
                    <span class="handbook-value">胆小，但代码写得很认真。</span>
                </div>
            </div>

            <div class="stats-grid fade-stagger">
                <img src="https://github-readme-stats.vercel.app/api?username=yanzhuangnanqiang&show_icons=true&hide_border=true&bg_color=ffffff00&title_color=1e4a4a&icon_color=2e7d7d&text_color=1a4a4a&hide_title=true" alt="GitHub Stats" width="48%" />
                <img src="https://github-readme-stats.vercel.app/api/top-langs/?username=yanzhuangnanqiang&layout=compact&hide_border=true&bg_color=ffffff00&title_color=1e4a4a&text_color=1a4a4a" alt="Top Langs" width="45%" />
            </div>

            <div class="link-group fade-stagger">
                <a class="btn" href="https://github.com/yanzhuangnanqiang" target="_blank">📂 GitHub</a>
                <a class="btn" href="#" target="_blank">📝 博客</a>
                <a class="btn" href="README.md" target="_blank">📋 README</a>
            </div>

            <div class="footer-note fade-stagger">
                <div class="visitor-badge">
                    <img src="https://komarev.com/ghpvc/?username=yanzhuangnanqiang&color=9ad8c5&style=flat-square" alt="visitors">
                </div>
                <div class="signature">
                    <samp>“写代码，安静点也挺好。” 🍃</samp>
                </div>
            </div>
        </div>
    </div>

<script>
// 1. 鼠标跟随光斑效果
const light = document.querySelector('.mouse-light');
document.addEventListener('mousemove', (e) => {
    light.style.transform = `translate(calc(${e.clientX}px - 50%), calc(${e.clientY}px - 50%))`;
});

// 2. 树叶飘落动画（保留原有逻辑，添加初始树叶速度微调营造“刚刚开始”的感觉）
const canvas = document.getElementById('leafCanvas');
const ctx = canvas.getContext('2d');
let leaves = [];

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

class Leaf {
    constructor(){
        this.reset();
        // 初始让树叶分布在画布各处，而不是全在顶部，更像“已经飘了一会儿”
        this.y = Math.random() * canvas.height;
    }
    reset(){
        this.x = Math.random() * canvas.width;
        this.y = -30;
        this.size = Math.random() * 12 + 6;
        this.speedY = Math.random() * 1 + 0.6;
        this.speedX = (Math.random() - 0.5) * 0.8;
        this.rotate = Math.random() * Math.PI * 2;
        this.rotateSpeed = (Math.random() - 0.5) * 0.03;
        this.opacity = Math.random() * 0.5 + 0.3;
    }
    update(){
        this.y += this.speedY;
        this.x += this.speedX + Math.sin(this.y / 80) * 0.6;
        this.rotate += this.rotateSpeed;
        if(this.y > canvas.height + 40) this.reset();
    }
    draw(){
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.rotate);
        ctx.beginPath();
        ctx.fillStyle = `rgba(120, 170, 130, ${this.opacity})`;
        ctx.ellipse(0,0,this.size,this.size/2,0,0,Math.PI*2);
        ctx.fill();
        ctx.restore();
    }
}

// 生成树叶，初始随机分布，营造“林中已有落叶飘零”的氛围
for(let i = 0; i < 45; i++){
    let leaf = new Leaf();
    leaf.y = Math.random() * canvas.height;  // 随机高度
    leaves.push(leaf);
}

function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    leaves.forEach(leaf=>{
        leaf.update();
        leaf.draw();
    });
    requestAnimationFrame(animate);
}
animate();

// 3. 可选的微小细节：当页面完全加载后，再让一些元素更柔和（无需额外操作，动画已处理）
</script>

</body>
</html>
